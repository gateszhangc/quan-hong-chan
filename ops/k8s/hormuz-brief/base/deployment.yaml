apiVersion: apps/v1
kind: Deployment
metadata:
  name: hormuz-brief
  labels:
    app.kubernetes.io/name: hormuz-brief
    app.kubernetes.io/part-of: hormuz-brief
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hormuz-brief
      app.kubernetes.io/part-of: hormuz-brief
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hormuz-brief
        app.kubernetes.io/part-of: hormuz-brief
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: web
          image: ghcr.io/gateszhangc/hormuz-brief:bootstrap
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: hormuz-brief-public-env
            - secretRef:
                name: hormuz-brief-env
                optional: true
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            tcpSocket:
              port: 3000
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 20
            tcpSocket:
              port: 3000
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            tcpSocket:
              port: 3000
