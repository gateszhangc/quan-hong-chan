apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: huo-er-mu-ci-hai-xia
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gateszhangc/quan-hong-chan.git
    targetRevision: main
    path: ops/k8s/huo-er-mu-ci-hai-xia/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: huo-er-mu-ci-hai-xia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
