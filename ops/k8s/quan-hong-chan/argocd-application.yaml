apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quan-hong-chan
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gateszhangc/quan-hong-chan.git
    targetRevision: main
    path: ops/k8s/quan-hong-chan/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: quan-hong-chan
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
