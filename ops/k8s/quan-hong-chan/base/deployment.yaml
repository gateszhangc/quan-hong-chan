apiVersion: apps/v1
kind: Deployment
metadata:
  name: quan-hong-chan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quan-hong-chan
  template:
    metadata:
      labels:
        app: quan-hong-chan
    spec:
      containers:
        - name: web
          image: ghcr.io/gateszhangc/quan-hong-chan:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: quan-hong-chan-config
          startupProbe:
            httpGet:
              path: /en
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /en
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /en
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
