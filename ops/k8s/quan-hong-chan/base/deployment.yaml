apiVersion: apps/v1
kind: Deployment
metadata:
  name: quan-hong-chan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quan-hong-chan
  template:
    metadata:
      labels:
        app: quan-hong-chan
    spec:
      containers:
        - name: web
          image: ghcr.io/gateszhangc/quan-hong-chan:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: quan-hong-chan-config
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
