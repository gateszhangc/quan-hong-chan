    <script>
      const deploymentId = "f956d41e-41db-4300-a9ad-e0c79470efb5";
      const userId = "codex-whatsapp-smoke-user";
      const qrEl = document.getElementById('qr');
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const updatedAtEl = document.getElementById('updated-at');
      const deployStatusEl = document.getElementById('deploy-status');
      async function pullStatus() {
        const response = await fetch('http://127.0.0.1:5001/api/deploy/' + deploymentId, {
          headers: { Authorization: 'Bearer ' + userId },
        });
        const payload = await response.json();
        const data = payload.data || payload;
        const login = data.whatsapp_login || {};
        statusEl.textContent = '状态：' + (login.status || data.status || 'unknown');
        messageEl.textContent = login.message || '';
        updatedAtEl.textContent = '二维码时间：' + (login.qrUpdatedAt || login.updatedAt || '');
        deployStatusEl.textContent = '部署状态：' + (data.status || 'unknown');
        if (login.qrSvgDataUrl) {
          qrEl.src = login.qrSvgDataUrl;
        }
        return { data, login };
      }
      async function restartQr() {
        const button = document.getElementById('restart-qr');
        button.disabled = true;
        button.textContent = '刷新中...';
        try {
          const response = await fetch('http://127.0.0.1:5001/api/deploy/' + deploymentId + '/whatsapp-login/restart', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + userId },
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || payload.message || 'Restart failed');
          }
          await pullStatus();
        } catch (error) {
          alert(error.message || String(error));
        } finally {
          button.disabled = false;
          button.textContent = '刷新二维码';
        }
      }
      document.getElementById('refresh-status').addEventListener('click', pullStatus);
      document.getElementById('restart-qr').addEventListener('click', restartQr);
      setInterval(() => {
        pullStatus().catch(() => {});
      }, 5000);
