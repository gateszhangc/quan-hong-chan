name: Build And Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "ops/k8s/quan-hong-chan/overlays/prod/kustomization.yaml"
  workflow_dispatch:

concurrency:
  group: quan-hong-chan-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/quan-hong-chan
  KUSTOMIZATION_FILE: ops/k8s/quan-hong-chan/overlays/prod/kustomization.yaml

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync kustomize image tag
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("ops/k8s/quan-hong-chan/overlays/prod/kustomization.yaml")
          image_name = "ghcr.io/gateszhangc/quan-hong-chan"
          new_tag = os.environ["GIT_SHA"]

          lines = path.read_text().splitlines()
          updated = False
          inside_images = False
          current_image = None

          for index, line in enumerate(lines):
            stripped = line.strip()
            if stripped == "images:":
              inside_images = True
              current_image = None
              continue

            if inside_images and stripped and not line.startswith((" ", "\t", "-")):
              inside_images = False
              current_image = None

            if not inside_images:
              continue

            if stripped.startswith("- name:"):
              current_image = stripped.split(":", 1)[1].strip()
              continue

            if stripped.startswith("name:"):
              current_image = stripped.split(":", 1)[1].strip()
              continue

            if current_image == image_name and stripped.startswith("newTag:"):
              prefix = line[: line.index("n")]
              lines[index] = f"{prefix}newTag: {new_tag}"
              updated = True
              break

          if not updated:
            raise SystemExit("image entry not found in kustomization.yaml")

          path.write_text("\n".join(lines) + "\n")
          PY

      - name: Commit updated tag
        run: |
          if git diff --quiet -- "$KUSTOMIZATION_FILE"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_FILE"
          git commit -m "chore: sync quan-hong-chan image tag ${GITHUB_SHA::7} [skip ci]"
          git push
